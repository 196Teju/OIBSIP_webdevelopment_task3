<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Roboto', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background:paleturquoise /* page background */
  }

  .converter {
    background: #2c2c2c; /* solid dark block */
    padding: 50px 35px;
    border-radius: 20px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* subtle shadow */
  }

  h2 {
    color: #fff;
    font-weight: 700;
    font-size: 28px;
    margin-bottom: 30px;
  }

  label {
    display: block;
    text-align: left;
    color: #fff;
    margin: 10px 0 5px;
    font-weight: bold;
    font-size: 14px;
  }

  input, select {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
  }

  select {
    font-weight: bold;
    background: #fff;
    color: #000;
    cursor: pointer;
  }

  .result {
    margin-top: 30px;
    font-size: 24px;
    font-weight: bold;
    color: #fff;
  }

  .error {
    color: #ff4d4d;
  }

  ::placeholder {
    color: rgba(255,255,255,0.7);
    font-style: italic;
  }
</style>
</head>
<body>

<div class="converter">
  <h2> Temperature Converter</h2>
  
  <label for="tempInput">Enter Temperature</label>
  <input type="text" id="tempInput" placeholder="e.g., 25">
  
  <label for="unitInput">From Unit</label>
  <select id="unitInput">
    <option value="C">Celsius (°C)</option>
    <option value="F">Fahrenheit (°F)</option>
    <option value="K">Kelvin (K)</option>
  </select>
  
  <label for="unitOutput">To Unit</label>
  <select id="unitOutput">
    <option value="C">Celsius (°C)</option>
    <option value="F">Fahrenheit (°F)</option>
    <option value="K">Kelvin (K)</option>
  </select>
  
  <div class="result" id="result">--</div>
</div>

<script>
const tempInput = document.getElementById('tempInput');
const unitInput = document.getElementById('unitInput');
const unitOutput = document.getElementById('unitOutput');
const resultDiv = document.getElementById('result');

function convertTemperature() {
  const input = tempInput.value.trim();
  const fromUnit = unitInput.value;
  const toUnit = unitOutput.value;

  if (input === "" || isNaN(input)) {
    resultDiv.innerHTML = "Please enter a valid number!";
    resultDiv.classList.add('error');
    return;
  }

  resultDiv.classList.remove('error');
  let temp = parseFloat(input);
  let tempInC;

  switch(fromUnit) {
    case 'C': tempInC = temp; break;
    case 'F': tempInC = (temp - 32) * 5/9; break;
    case 'K': tempInC = temp - 273.15; break;
  }

  let convertedTemp;
  switch(toUnit) {
    case 'C': convertedTemp = tempInC; break;
    case 'F': convertedTemp = (tempInC * 9/5) + 32; break;
    case 'K': convertedTemp = tempInC + 273.15; break;
  }

  resultDiv.innerHTML = `${convertedTemp.toFixed(2)} °${toUnit}`;
}

tempInput.addEventListener('input', convertTemperature);
unitInput.addEventListener('change', convertTemperature);
unitOutput.addEventListener('change', convertTemperature);
</script>

</body>
</html>
